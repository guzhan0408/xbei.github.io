<!DOCTYPE html>
<html>
<head>
<title>武器库7.0</title>
<style>
.container { width: 500px; margin: 0 auto; border: 2px solid #333; padding: 20px; text-align: center; }
.weapon-item { margin: 10px 0; padding: 10px; border: 1px solid #ccc; text-align: left; }
.important { color: red; font-weight: bold; }
button { margin: 5px; padding: 5px 10px; }
</style>
</head>
<body>
<div class="container">
<h1>武器对象</h1>
<div id="weapons7"></div>
<button onclick="addWeapon7()">添加武器</button>
</div>

<script>
let weapons7 = [
{ title:"191步枪", content:"口径5.8mm，重约3.5kg，有效射程800米", important: true },
{ title:"东风17", content:"射程2500公里，10马赫滑翔突防。", important: false }
];
function showWeapons7(){
let html = "";
for(let i=0;i<weapons7.length;i++){
let n = weapons7[i];
let cls = n.important ? "important" : "";
html += `<div class="weapon-item">`;
html += `<h3 class="${cls}">${n.title}</h3>`;
html += `<p>${n.content}</p>`;
html += `<button onclick="toggleImportant7(${i})">切换重要</button>`;
html += `</div>`;
}
document.getElementById('weapons7').innerHTML = html;
}
function toggleImportant7(index){
weapons7[index].important = !weapons7[index].important;
showWeapons7();
}
function addWeapon7(){
let weaponTitle = prompt("新武器的名字：");
let weaponContent = prompt("新武器的描述：");
weapons7.push({ title: weaponTitle, content: weaponContent, important: false });
showWeapons7();
}
showWeapons7();
</script>
</body>
</html>
